<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भूमि रिकॉर्ड खोज प्रणाली – हल्का 43 एवं 28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --royal: #1a1a6e;
            --royal-mid: #2d2db0;
            --gold: #f0a500;
            --gold-light: #ffd966;
            --cream: #fffdf5;
            --surface: #ffffff;
            --text-main: #1a1a2e;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --green: #059669;
            --orange: #d97706;
            --shadow-card: 0 4px 24px rgba(26, 26, 110, 0.10);
            --shadow-hover: 0 12px 40px rgba(26, 26, 110, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
            background: var(--cream);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 10% 5%, rgba(45, 45, 176, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 90%, rgba(240, 165, 0, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
        }

        /* ── Header ── */
        .site-header {
            background: linear-gradient(135deg, var(--royal) 0%, #2d2db0 60%, #1e3a8a 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 32px rgba(26, 26, 110, 0.35);
        }

        .site-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .header-gold-bar {
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        /* ── Emblem ── */
        .emblem {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--gold) 0%, var(--gold-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 0 4px rgba(240, 165, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        /* ── Tab Bar ── */
        .tab-bar {
            background: #fff;
            border-radius: 16px;
            padding: 6px;
            display: inline-flex;
            gap: 6px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 10px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.25s;
            outline: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--royal), var(--royal-mid));
            color: #fff;
            box-shadow: 0 4px 16px rgba(26, 26, 110, 0.30);
        }

        .tab-btn:not(.active) {
            background: transparent;
            color: var(--text-muted);
        }

        .tab-btn:not(.active):hover {
            background: #f1f5f9;
            color: var(--royal);
        }

        /* ── Search Card ── */
        .search-card {
            background: #fff;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            padding: 36px;
            position: relative;
            overflow: hidden;
        }

        .search-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--royal), var(--royal-mid), var(--gold));
        }

        /* ── Form Controls ── */
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .form-select,
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-select:focus,
        .form-input:focus {
            border-color: var(--royal-mid);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(45, 45, 176, 0.10);
        }

        .form-select[disabled] {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            pointer-events: none;
        }

        /* ── Search Button ── */
        .btn-search {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--royal) 0%, var(--royal-mid) 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(26, 26, 110, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(26, 26, 110, 0.45);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        /* ── Loading Spinner ── */
        .spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 4px solid #e2e8f0;
            border-top-color: var(--royal-mid);
            animation: spin 0.8s linear infinite;

        @keyframes spin {
            to {

            }

        /* ── Result Cards ── */
        .result-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideUp 0.4s ease both;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        @keyframes slideUp {

                transform: translateY(24px);

            to {
                opacity: 1;

            }
        }

        .stat-chip {

        .stat-chip-val {

        .type-badge.asinchai {

            color: #92400e;

        /* ── PDF Button ── */
        .btn-pdf {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;

            border: none;
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.30);
            transition: all 0.2s;
        }

        .btn-pdf:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }

        /* ── Portfolio Banner ── */
        .portfolio-banner {
            background: linear-gradient(135deg, var(--royal) 0%, #1e40af 60%, #1e3a8a 100%);
            border-radius: 20px;
            color: #fff;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(26, 26, 110, 0.30);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s ease both;
        }

        .portfolio-banner::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -10%;
            width: 300px;
            height: 300px;

        .btn-portfolio-pdf {

            color: var(--royal);

            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;

            box-shadow: 0 4px 16px rgba(240, 165, 0, 0.40);

            background: var(--gold-light);

        }

        /* ── Empty State ── */
        .empty-box {
            text-align: center;
            padding: 64px 32px;

            border: 2px dashed var(--border);
            animation: slideUp 0.4s ease both;

        /* ── Animate in ── */
        .fade-in {
            animation: fadeIn 0.5s ease both;

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .search-card {
                padding: 24px 18px;
            }

            .pf-stat-val {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- ═══════════════════ HEADER ═══════════════════ -->

    <main style="max-width:900px; margin:0 auto; padding:32px 16px 80px; position:relative; z-index:1;">

        <!-- Tab Bar -->
        <div style="display:flex; justify-content:center; margin-bottom:28px;" class="fade-in">

    <!-- ═══════════════════ SCRIPT ═══════════════════ -->
    <script>
        // Direct URL (kept for reference; fetching via proxy chain below)
        // const CSV_URL = "...";

        let records = [];
        let currentTab = 'khasra';

        // ── Toast ──────────────────────────────────────
        function toast(msg, type = 'success') {
            const bg = { success: 'linear-gradient(to right,#059669,#047857)', error: 'linear-gradient(to right,#dc2626,#b91c1c)', info: 'linear-gradient(to right,#2563eb,#1a1a6e)' };
            Toastify({ text: msg, duration: 3500, gravity: 'top', position: 'right', style: { background: bg[type] || bg.info, borderRadius: '10px', fontWeight: '700', fontSize: '14px' } }).showToast();
        }

        // ── CSV Loader with robust proxy chain ─────────
        async function loadData() {
            document.getElementById('recordCountBadge').textContent = '⏳ डेटा लोड हो रहा है...';

            const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7w0RI9RMbD3vx841C6CHzFyHwwbX2L5zyhjabc2ov7AvR7OWzJfXgvbiPvV6oXvhJZj5RCmcOzq2r/pub?gid=1832973148&single=true&output=csv";

            // 6 proxy fallbacks in order of reliability
            const URLS = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(SHEET_URL)}`,
                `https://corsproxy.io/?${encodeURIComponent(SHEET_URL)}`,
                `https://thingproxy.freeboard.io/fetch/${SHEET_URL}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(SHEET_URL)}`,
                `https://htmldriven.com/fetch?url=${encodeURIComponent(SHEET_URL)}`,
                SHEET_URL  // direct last attempt
            ];

            async function tryFetch(url) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 10000); // 10s timeout
                try {
                    const res = await fetch(url, { cache: 'no-cache', redirect: 'follow', signal: controller.signal });
                    clearTimeout(timer);
                    if (!res.ok) return null;
                    const text = await res.text();
                    // Validate: must contain real CSV data
                    return text.includes('ग्राम') && text.length > 500 ? text : null;
                } catch (_) {
                    clearTimeout(timer);
                    return null;
                }
            }

            let csvText = null;
            for (const url of URLS) {
                // Try each proxy up to 2 times before moving to next
                for (let attempt = 0; attempt < 2; attempt++) {
                    csvText = await tryFetch(url);
                    if (csvText) break;
                    await new Promise(r => setTimeout(r, 800)); // small wait before retry
                }
                if (csvText) break;
            }

            if (!csvText) {
                document.getElementById('recordCountBadge').innerHTML =
                    `❌ लोड विफल &nbsp;<button onclick="loadData()" style="background:#1a1a6e;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;font-weight:700;">🔄 पुनः प्रयास</button>`;
                toast('डेटा लोड विफल — "पुनः प्रयास" बटन दबाएं', 'error');
                return;
            }

            records = parseCSV(csvText);
            fillVillages();
            document.getElementById('recordCountBadge').textContent = `✅ ${records.length} रिकॉर्ड लोड`;
            toast(`${records.length} रिकॉर्ड सफलतापूर्वक लोड हुए`, 'success');
        }


        function parseCSV(text) {
            const rows = []; let row = []; let field = ''; let inQ = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i], n = text[i + 1];
                if (inQ) {
                    if (c === '"' && n === '"') { field += '"'; i++; }
                    else if (c === '"') inQ = false;
                    else field += c;
                } else {
                    if (c === '"') inQ = true;
                    else if (c === ',') { row.push(field.trim()); field = ''; }
                    else if (c === '\n' || c === '\r') {
                        row.push(field.trim());
                        if (row.length > 1) rows.push(row);
                        row = []; field = '';
                        if (c === '\r' && n === '\n') i++;
                    } else field += c;
                }
            }
            if (row.length || field) { row.push(field.trim()); rows.push(row); }
            const h = rows[0];
            return rows.slice(1).map((r, i) => {
                const o = {}; h.forEach((k, j) => o[k] = r[j]);
                return {
                    id: i + 1,
                    v: o['ग्राम'] || '',
                    kn: o['खसरा नंबर'] || '',
                    bn: o['बसरा नंबर'] || '',
                    owner: (o['भूमिस्वामी का नाम'] || 'अज्ञात').replace(/\n/g, ' '),
                    area: parseFloat(o['क्षेत्रफल'] || 0).toFixed(3),
                    type: o['सिंचित / असिंचित'] || '',
                    nistar: o['निस्तार पत्रक विवरण'] || ''
                };
            });
        }

        function fillVillages() {
            const sel = document.getElementById('villageInput');
            const vals = [...new Set(records.map(r => r.v).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'hi'));
            while (sel.options.length > 1) sel.remove(1);
            vals.forEach(v => { const o = document.createElement('option'); o.value = o.text = v; sel.appendChild(o); });
        }

        // ── Village change → fill basra ───────────────
        document.getElementById('villageInput').addEventListener('change', function () {
            if (currentTab !== 'basra') return;
            const v = this.value;
            const sel = document.getElementById('basraVal');
            const basras = [...new Set(records.filter(r => r.v === v).map(r => r.bn).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'hi'));
            sel.innerHTML = '<option value="" disabled selected>— बसरा चुनें —</option>';
            basras.forEach(b => { const o = document.createElement('option'); o.value = o.text = b; sel.appendChild(o); });
            sel.disabled = false;
            sel.classList.remove('form-select');
            sel.className = 'form-select';
            toast(`${basras.length} बसरा उपलब्ध`, 'info');
        });

        // ── Tab Switch ────────────────────────────────
        function switchTab(tab) {
            currentTab = tab;
            const isDash = tab === 'dashboard';

            // Show/hide search form
            document.getElementById('searchForm').closest('.search-card').style.display = isDash ? 'none' : '';
            document.getElementById('khasraGroup').style.display = tab === 'khasra' ? '' : 'none';
            document.getElementById('basraGroup').style.display = tab === 'basra' ? '' : 'none';

            // Tab buttons
            document.getElementById('tab-khasra').className = 'tab-btn' + (tab === 'khasra' ? ' active' : '');
            document.getElementById('tab-basra').className = 'tab-btn' + (tab === 'basra' ? ' active' : '');
            document.getElementById('tab-dashboard').className = 'tab-btn' + (tab === 'dashboard' ? ' active' : '');

            // Show/hide results and dashboard panels
            document.getElementById('resultsDiv').innerHTML = '';
            document.getElementById('emptyDiv').style.display = 'none';
            document.getElementById('dashboardDiv').style.display = isDash ? '' : 'none';

            if (isDash) {
                showDashboard();
                return;
            }

            // If village already chosen, populate basra
            if (tab === 'basra') {
                const v = document.getElementById('villageInput').value;
                if (v) document.getElementById('villageInput').dispatchEvent(new Event('change'));
            }
        }

        // ── Search ────────────────────────────────────
        function handleSearch(e) {
            e.preventDefault();
            const v = document.getElementById('villageInput').value;
            const val = currentTab === 'khasra'
                ? document.getElementById('khasraVal').value.trim()
                : document.getElementById('basraVal').value;

            if (!v) { toast('कृपया ग्राम चुनें', 'error'); return; }
            if (!val) { toast(`कृपया ${currentTab === 'khasra' ? 'खसरा' : 'बसरा'} नंबर चुनें/दर्ज करें`, 'error'); return; }

            setLoading(true);
            setTimeout(() => {
                const found = currentTab === 'khasra'
                    ? records.filter(r => r.v === v && r.kn == val)
                    : records.filter(r => r.v === v && r.bn == val);
                setLoading(false);
                renderResults(found, v, val);
            }, 60);
        }

        function setLoading(on) {
            document.getElementById('loadingDiv').style.display = on ? '' : 'none';
            document.getElementById('searchBtn').disabled = on;
            document.getElementById('btnLabel').textContent = on ? 'खोज रहे हैं...' : 'खोजें';
        }

        // ── Render ────────────────────────────────────
        function renderResults(found, v, val) {
            const res = document.getElementById('resultsDiv');
            const emp = document.getElementById('emptyDiv');
            res.innerHTML = '';

            if (!found.length) {
                emp.style.display = '';
                toast('कोई रिकॉर्ड नहीं मिला', 'error');
                return;
            }
            emp.style.display = 'none';
            toast(`${found.length} रिकॉर्ड मिले`, 'success');

            // Portfolio banner for basra
            if (currentTab === 'basra') {
                const totalArea = found.reduce((s, r) => s + parseFloat(r.area), 0).toFixed(3);
                const banner = document.createElement('div');
                banner.className = 'portfolio-banner';
                banner.style.marginBottom = '24px';
                banner.innerHTML = `
        <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between;">
          <div>
            <div style="font-size:11px; font-weight:700; opacity:0.6; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px;">भूमिस्वामी पोर्टफोलियो</div>
            <div style="font-size:22px; font-weight:900; line-height:1.1;">${found[0].owner}</div>
            <div style="margin-top:6px; opacity:0.75; font-size:14px;">ग्राम: ${v} &nbsp;|&nbsp; बसरा: ${val}</div>
          </div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <div class="pf-stat">
              <div class="pf-stat-label">कुल खसरा</div>
              <div class="pf-stat-val">${found.length}</div>
            </div>
            <div class="pf-stat">
              <div class="pf-stat-label">कुल क्षेत्रफल</div>
              <div class="pf-stat-val">${totalArea} <span style="font-size:14px;font-weight:600;opacity:0.7;">हे.</span></div>
            </div>
          </div>
          
        </div>`;
                res.appendChild(banner);
            }

            // Cards grid
            const grid = document.createElement('div');
            grid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px;';
            found.forEach((r, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = `${idx * 0.06}s`;
                const hdrClass = `card-header-${currentTab}`;
                const typeBadge = r.type.includes('असिंचित') ? 'asinchai' : 'sinchai';
                card.innerHTML = `
        <div class="${hdrClass}" style="padding:16px 20px; display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <div style="font-size:10px; font-weight:700; color:rgba(255,255,255,0.65); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px;">
              ${currentTab === 'khasra' ? 'खसरा नंबर' : 'बसरा नंबर'}
            </div>
            <div class="card-kn" style="color:#fff;">${currentTab === 'khasra' ? r.kn : r.bn}</div>
            <div style="font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px; font-weight:600;">${r.v}</div>
          </div>
        </div>
        <div style="padding:18px 20px; display:flex; flex-direction:column; gap:14px;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="stat-chip">
              <div class="stat-chip-label">खसरा नं.</div>
              <div class="stat-chip-val">${r.kn}</div>
            </div>
            <div class="stat-chip">
              <div class="stat-chip-label">बसरा नं.</div>
              <div class="stat-chip-val">${r.bn}</div>
            </div>
          </div>
          <div style="border-top:1px solid var(--border); padding-top:12px;">
            <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px;">भूमिस्वामी</div>
            <div style="font-size:14px; font-weight:700; color:var(--text-main); line-height:1.4;">${r.owner}</div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; border-top:1px solid var(--border); padding-top:12px;">
            <div>
              <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px;">क्षेत्रफल (हे.)</div>
              <div style="font-size:18px; font-weight:900; color:var(--text-main);">${r.area}</div>
            </div>
            <div>
              <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px;">प्रकार</div>
              <span class="type-badge ${typeBadge}">${r.type || '—'}</span>
            </div>
          </div>
          ${r.nistar ? `
          <div style="background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:10px 14px; border-top:1px solid var(--border); padding-top:12px;">
            <div style="font-size:10px; font-weight:700; color:#92400e; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px;">निस्तार विवरण</div>
            <div style="font-size:14px; font-weight:700; color:#78350f; line-height:1.5; font-family:'Noto Sans Devanagari',Arial,sans-serif;">${r.nistar}</div>
          </div>` : ''}
        </div>`;
                grid.appendChild(card);
            });
            res.appendChild(grid);
        }

        function escJS(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

        // ══════════════════════════════════════════════
        // 📊 GRAM-WISE DASHBOARD
        // ══════════════════════════════════════════════

        const GRAM_GRADIENTS = [
            'linear-gradient(135deg,#1a1a6e,#3b5bdb)',
            'linear-gradient(135deg,#065f46,#059669)',
            'linear-gradient(135deg,#7c2d12,#ea580c)',
            'linear-gradient(135deg,#4c1d95,#7c3aed)',
            'linear-gradient(135deg,#831843,#db2777)',
            'linear-gradient(135deg,#1e3a5f,#0ea5e9)',
            'linear-gradient(135deg,#14532d,#16a34a)',
            'linear-gradient(135deg,#7f1d1d,#dc2626)',
            'linear-gradient(135deg,#134e4a,#0d9488)',
            'linear-gradient(135deg,#312e81,#6366f1)',
        ];

        function showDashboard() {
            const dash = document.getElementById('dashboardDiv');
            dash.style.display = '';

            if (!records.length) {
                dash.innerHTML = `<div style="text-align:center;padding:60px 0;color:var(--text-muted);font-size:16px;font-weight:600;">⏳ पहले डेटा लोड होने दें...</div>`;
                return;
            }

            // Aggregate gram-wise stats
            const gramMap = {};
            records.forEach(r => {
                const g = r.v || 'अज्ञात';
                if (!gramMap[g]) gramMap[g] = { recs: [], owners: {} };
                gramMap[g].recs.push(r);
                const ow = r.owner || 'अज्ञात';
                gramMap[g].owners[ow] = (gramMap[g].owners[ow] || 0) + 1;
            });

            const grams = Object.keys(gramMap).sort((a, b) => a.localeCompare(b, 'hi'));

            // Summary totals bar
            const totalRec = records.length;
            const totalArea = records.reduce((s, r) => s + parseFloat(r.area || 0), 0).toFixed(2);
            const sinchai = records.filter(r => r.type && r.type.includes('सिंचित') && !r.type.includes('असिंचित')).length;

            let html = `
            <div style="margin-bottom:28px;">
                <h2 style="font-size:22px;font-weight:900;color:var(--royal);margin-bottom:16px;font-family:'Noto Sans Devanagari',sans-serif;">
                    📊 ग्रामवार भूमि सारांश डैशबोर्ड
                </h2>
                <!-- Top Summary Strip -->
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;">
                    <div style="background:linear-gradient(135deg,#1a1a6e,#3b5bdb);color:#fff;border-radius:16px;padding:18px 20px;text-align:center;box-shadow:0 4px 20px rgba(26,26,110,0.3);">
                        <div style="font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">कुल ग्राम</div>
                        <div style="font-size:36px;font-weight:900;line-height:1;">${grams.length}</div>
                    </div>
                    <div style="background:linear-gradient(135deg,#065f46,#059669);color:#fff;border-radius:16px;padding:18px 20px;text-align:center;box-shadow:0 4px 20px rgba(5,150,105,0.3);">
                        <div style="font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">कुल रिकॉर्ड</div>
                        <div style="font-size:36px;font-weight:900;line-height:1;">${totalRec}</div>
                    </div>
                    <div style="background:linear-gradient(135deg,#7c2d12,#ea580c);color:#fff;border-radius:16px;padding:18px 20px;text-align:center;box-shadow:0 4px 20px rgba(234,88,12,0.3);">
                        <div style="font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">कुल क्षेत्रफल (हे.)</div>
                        <div style="font-size:34px;font-weight:900;line-height:1;">${totalArea}</div>
                    </div>
                    <div style="background:linear-gradient(135deg,#1e3a5f,#0ea5e9);color:#fff;border-radius:16px;padding:18px 20px;text-align:center;box-shadow:0 4px 20px rgba(14,165,233,0.3);">
                        <div style="font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">सिंचित खसरे</div>
                        <div style="font-size:36px;font-weight:900;line-height:1;">${sinchai}</div>
                    </div>
                </div>

                <!-- Per-Gram Cards -->
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;">
                ${grams.map((g, i) => {
                const d = gramMap[g];
                const recs = d.recs;
                const area = recs.reduce((s, r) => s + parseFloat(r.area || 0), 0).toFixed(2);
                const sCount = recs.filter(r => r.type && r.type.includes('सिंचित') && !r.type.includes('असिंचित')).length;
                const aCount = recs.length - sCount;
                const sinchaiPct = recs.length ? Math.round((sCount / recs.length) * 100) : 0;
                const topOwner = Object.entries(d.owners).sort((a, b) => b[1] - a[1])[0];
                const grad = GRAM_GRADIENTS[i % GRAM_GRADIENTS.length];
                const uniqueBasras = new Set(recs.map(r => r.bn)).size;

                return `
                    <div class="result-card" style="overflow:hidden;border-radius:20px;animation:slideUp 0.4s ease both;animation-delay:${i * 0.05}s;">
                        <!-- Card Header -->
                        <div style="background:${grad};padding:18px 20px;position:relative;overflow:hidden;">
                            <div style="position:absolute;top:-20px;right:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
                            <div style="position:absolute;bottom:-30px;left:-10px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.05);"></div>
                            <div style="position:relative;z-index:1;">
                                <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">ग्राम</div>
                                <div style="font-size:20px;font-weight:900;color:#fff;font-family:'Noto Sans Devanagari',sans-serif;line-height:1.2;">${g}</div>
                            </div>
                        </div>

                        <!-- Stats Grid -->
                        <div style="padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                            <div class="stat-chip">
                                <div class="stat-chip-label">कुल खसरे</div>
                                <div class="stat-chip-val">${recs.length}</div>
                            </div>
                            <div class="stat-chip">
                                <div class="stat-chip-label">क्षेत्रफल (हे.)</div>
                                <div class="stat-chip-val" style="font-size:16px;">${area}</div>
                            </div>
                            <div class="stat-chip" style="background:#d1fae5;">
                                <div class="stat-chip-label" style="color:#065f46;">सिंचित</div>
                                <div class="stat-chip-val" style="color:#065f46;">${sCount}</div>
                            </div>
                            <div class="stat-chip" style="background:#fef3c7;">
                                <div class="stat-chip-label" style="color:#92400e;">असिंचित</div>
                                <div class="stat-chip-val" style="color:#92400e;">${aCount}</div>
                            </div>
                        </div>

                        <!-- Progress bar: sinchai % -->
                        <div style="padding:0 20px 14px;">
                            <div style="display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;">
                                <span>सिंचित अनुपात</span><span>${sinchaiPct}%</span>
                            </div>
                            <div style="background:#e2e8f0;border-radius:99px;height:8px;overflow:hidden;">
                                <div style="width:${sinchaiPct}%;height:100%;background:${grad};border-radius:99px;transition:width 0.6s ease;"></div>
                            </div>
                        </div>

                        <!-- Top Owner -->
                        <div style="padding:12px 20px 16px;border-top:1px solid var(--border);">
                            <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px;">शीर्ष भूमिस्वामी</div>
                            <div style="font-size:13px;font-weight:700;color:var(--text-main);font-family:'Noto Sans Devanagari',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${topOwner ? topOwner[0] : '—'}</div>
                            ${topOwner ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${topOwner[1]} खसरे • ${uniqueBasras} बसरे</div>` : ''}
                        </div>
                    </div>`;
            }).join('')}
                </div>
            </div>`;

            dash.innerHTML = html;
        }


        // ── Init ──────────────────────────────────────
        loadData();

    </script>
</body>

</html>
