<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भूमि रिकॉर्ड खोज प्रणाली – हल्का 43 एवं 28</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --royal: #1a1a6e;
            --royal-mid: #2d2db0;
            --gold: #f0a500;
            --gold-light: #ffd966;
            --cream: #fffdf5;
            --surface: #ffffff;
            --text-main: #1a1a2e;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --green: #059669;
            --orange: #d97706;
            --shadow-card: 0 4px 24px rgba(26, 26, 110, 0.10);
            --shadow-hover: 0 12px 40px rgba(26, 26, 110, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
            background: var(--cream);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background ── */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 10% 5%, rgba(45, 45, 176, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 90%, rgba(240, 165, 0, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
        }

        /* ── Header ── */
        .site-header {
            background: linear-gradient(135deg, var(--royal) 0%, #2d2db0 60%, #1e3a8a 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 32px rgba(26, 26, 110, 0.35);
        }

        .site-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .header-gold-bar {
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
        }

        /* ── Emblem ── */
        .emblem {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--gold) 0%, var(--gold-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 0 4px rgba(240, 165, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        /* ── Tab Bar ── */
        .tab-bar {
            background: #fff;
            border-radius: 16px;
            padding: 6px;
            display: inline-flex;
            gap: 6px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 10px 28px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.25s;
            outline: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--royal), var(--royal-mid));
            color: #fff;
            box-shadow: 0 4px 16px rgba(26, 26, 110, 0.30);
        }

        .tab-btn:not(.active) {
            background: transparent;
            color: var(--text-muted);
        }

        .tab-btn:not(.active):hover {
            background: #f1f5f9;
            color: var(--royal);
        }

        /* ── Search Card ── */
        .search-card {
            background: #fff;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            padding: 36px;
            position: relative;
            overflow: hidden;
        }

        .search-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--royal), var(--royal-mid), var(--gold));
        }

        /* ── Form Controls ── */
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .form-select,
        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-select:focus,
        .form-input:focus {
            border-color: var(--royal-mid);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(45, 45, 176, 0.10);
        }

        .form-select[disabled] {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            pointer-events: none;
        }

        /* ── Search Button ── */
        .btn-search {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--royal) 0%, var(--royal-mid) 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(26, 26, 110, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(26, 26, 110, 0.45);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        /* ── Loading Spinner ── */
        .spinner {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 4px solid #e2e8f0;
            border-top-color: var(--royal-mid);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Result Cards ── */
        .result-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideUp 0.4s ease both;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header-khasra {
            background: linear-gradient(135deg, #1a1a6e, #2563eb);
        }

        .card-header-basra {
            background: linear-gradient(135deg, #065f46, #059669);
        }

        .card-kn {
            font-size: 28px;
            font-weight: 900;
            line-height: 1;
        }

        .stat-chip {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
        }

        .stat-chip-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .stat-chip-val {
            font-size: 20px;
            font-weight: 900;
            color: var(--text-main);
            margin-top: 2px;
        }

        .type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .type-badge.sinchai {
            background: #d1fae5;
            color: #065f46;
        }

        .type-badge.asinchai {
            background: #fef3c7;
            color: #92400e;
        }

        /* ── PDF Button ── */
        .btn-pdf {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.20);
            color: #fff;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.30);
            transition: all 0.2s;
        }

        .btn-pdf:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.04);
        }

        /* ── Portfolio Banner ── */
        .portfolio-banner {
            background: linear-gradient(135deg, var(--royal) 0%, #1e40af 60%, #1e3a8a 100%);
            border-radius: 20px;
            color: #fff;
            padding: 28px;
            box-shadow: 0 8px 32px rgba(26, 26, 110, 0.30);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.4s ease both;
        }

        .portfolio-banner::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .pf-stat {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.20);
            border-radius: 14px;
            padding: 16px 20px;
            text-align: center;
        }

        .pf-stat-label {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .pf-stat-val {
            font-size: 30px;
            font-weight: 900;
            margin-top: 4px;
        }

        .btn-portfolio-pdf {
            background: var(--gold);
            color: var(--royal);
            padding: 12px 22px;
            border-radius: 12px;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(240, 165, 0, 0.40);
        }

        .btn-portfolio-pdf:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
        }

        /* ── Empty State ── */
        .empty-box {
            text-align: center;
            padding: 64px 32px;
            background: #fff;
            border-radius: 20px;
            border: 2px dashed var(--border);
            animation: slideUp 0.4s ease both;
        }

        /* ── Animate in ── */
        .fade-in {
            animation: fadeIn 0.5s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .search-card {
                padding: 24px 18px;
            }

            .pf-stat-val {
                font-size: 24px;
            }
        }

        /* ══ DASHBOARD NEW FEATURES ══ */

        /* Animated counter number */
        @keyframes countUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dash-counter {
            animation: countUp 0.6s ease both;
        }

        /* Dashboard search bar */
        .dash-search-wrap {
            position: relative;
            margin-bottom: 24px;
        }

        .dash-search-input {
            width: 100%;
            padding: 13px 18px 13px 46px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .dash-search-input:focus {
            border-color: var(--royal-mid);
            box-shadow: 0 0 0 4px rgba(45, 45, 176, 0.10);
        }

        .dash-search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* Bar chart */
        .bar-chart-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .bar-label {
            width: 130px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
            font-family: 'Noto Sans Devanagari', sans-serif;
        }

        .bar-track {
            flex: 1;
            height: 28px;
            background: #f1f5f9;
            border-radius: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            align-items: center;
            padding-left: 10px;
        }

        .bar-val {
            width: 70px;
            font-size: 13px;
            font-weight: 800;
            color: var(--text-muted);
            text-align: right;
            flex-shrink: 0;
        }

        /* Ring chart */
        .ring-wrap {
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .ring-svg circle {
            fill: none;
            stroke-width: 16;
        }

        /* Leaderboard */
        .lb-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid var(--border);
            transition: background 0.15s;
            margin-bottom: 10px;
            animation: slideUp 0.4s ease both;
        }

        .lb-row:hover {
            background: #f0f4ff;
        }

        .lb-rank {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--royal), var(--royal-mid));
            color: #fff;
            font-size: 14px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .lb-rank.gold {
            background: linear-gradient(135deg, #f0a500, #ffd966);
            color: #7c2d12;
        }

        .lb-rank.silver {
            background: linear-gradient(135deg, #94a3b8, #cbd5e1);
            color: #1e293b;
        }

        .lb-rank.bronze {
            background: linear-gradient(135deg, #b45309, #d97706);
            color: #fff;
        }

        .lb-name {
            flex: 1;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            font-family: 'Noto Sans Devanagari', sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-stat {
            text-align: right;
            flex-shrink: 0;
        }

        .lb-stat-val {
            font-size: 16px;
            font-weight: 900;
            color: var(--royal);
        }

        .lb-stat-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* Section card */
        .dash-section {
            background: #fff;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            padding: 24px;
            margin-bottom: 24px;
            animation: slideUp 0.4s ease both;
        }

        .dash-section-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--royal);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
    <!-- PapaParse for ultra-fast CSV streaming -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>

    <div class="bg-mesh"></div>

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <div class="header-gold-bar"></div>
    <header class="site-header">
        <div style="max-width:900px; margin:0 auto; padding:28px 24px;">
            <div style="display:flex; align-items:center; gap: 8px; flex-wrap:wrap;">
                <div class="emblem">🌾</div>
                <div style="flex:1; min-width:200px;">
                    <div
                        style="font-size:12px; color:rgba(255,255,255,0.55); font-weight:600; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:4px;">
                        छत्तीसगढ़ शासन – राजस्व विभाग
                    </div>
                    <h1
                        style="font-size:clamp(20px,4vw,30px); font-weight:900; color:#fff; line-height:1.1; font-family:'Noto Sans Devanagari',sans-serif;">
                        भूमि रिकॉर्ड खोज प्रणाली
                    </h1>
                    <div style="margin-top:6px; font-size:14px; color:var(--gold-light); font-weight:600;">
                        हल्का 43 एवं 28 — ग्रामवार खसरा / बसरा सूची
                    </div>
                </div>
                <div
                    style="text-align:right; display:flex; flex-direction:column; gap:4px; color:rgba(255,255,255,0.6); font-size:12px;">
                    <span id="recordCountBadge"
                        style="background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.20); border-radius:8px; padding:6px 14px; font-weight:700; color:#fff; font-size:13px;">
                        डेटा लोड हो रहा है...
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- ═══════════════════ MAIN ═══════════════════ -->
    <main style="max-width:900px; margin:0 auto; padding:32px 16px 80px; position:relative; z-index:1;">

        <!-- Tab Bar -->
        <div style="display:flex; justify-content:center; margin-bottom:28px;" class="fade-in">
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-khasra" onclick="switchTab('khasra')">
                    📄 खसरा खोज
                </button>
                <button class="tab-btn" id="tab-basra" onclick="switchTab('basra')">
                    👥 बसरा खोज
                </button>
                <button class="tab-btn" id="tab-nam" onclick="switchTab('nam')">
                    👤 नाम खोज
                </button>
                <button class="tab-btn" id="tab-dashboard" onclick="switchTab('dashboard')">
                    📊 डैशबोर्ड
                </button>
            </div>
        </div>

        <!-- Search Card -->
        <div class="search-card fade-in" style="max-width:640px; margin:0 auto 32px;">
            <form id="searchForm" onsubmit="handleSearch(event)">
                <div style="display:grid; gap:18px;">

                    <!-- Village -->
                    <div>
                        <label class="form-label">🏘️ ग्राम का नाम</label>
                        <div class="select-wrap">
                            <select id="villageInput" class="form-select" required>
                                <option value="" disabled selected>— ग्राम चुनें —</option>
                            </select>
                        </div>
                    </div>

                    <!-- Khasra Input -->
                    <div id="khasraGroup">
                        <label class="form-label">📄 खसरा नंबर</label>
                        <input type="text" id="khasraVal" class="form-input" placeholder="उदाहरण: 123 या 45/1">
                    </div>

                    <!-- Basra Input -->
                    <div id="basraGroup" style="display:none;">
                        <label class="form-label">📋 बसरा नंबर</label>
                        <div class="select-wrap">
                            <select id="basraVal" class="form-select" disabled>
                                <option value="" disabled selected>— पहले ग्राम चुनें —</option>
                            </select>
                        </div>
                    </div>

                    <!-- Nam Input -->
                    <div id="namGroup" style="display:none;">
                        <label class="form-label">👤 भूमिस्वामी का नाम</label>
                        <input type="text" id="namVal" list="farmerList" class="form-input"
                            placeholder="नाम टाइप करें या चुनें" disabled>
                        <datalist id="farmerList"></datalist>
                    </div>

                    <!-- Button -->
                    <button type="submit" class="btn-search" id="searchBtn" style="margin-top:4px;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                            viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <span id="btnLabel">खोजें</span>
                    </button>

                </div>
            </form>
        </div>

        <!-- Loading -->
        <div id="loadingDiv" style="display:none; text-align:center; padding:48px 0;" class="fade-in">
            <div class="spinner" style="margin:0 auto 16px;"></div>
            <p style="color:var(--text-muted); font-weight:600;">खोज जारी है...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyDiv" style="display:none; max-width:640px; margin:0 auto;">
            <div class="empty-box">
                <div style="font-size:56px; margin-bottom:16px;">🔍</div>
                <h3 style="font-size:20px; font-weight:800; color:var(--text-main); margin-bottom:8px;">कोई रिकॉर्ड नहीं
                    मिला</h3>
                <p style="color:var(--text-muted); font-size:14px;">कृपया ग्राम और नंबर की जांच करके दोबारा खोजें।</p>
            </div>
        </div>

        <!-- Results -->
        <div id="resultsDiv"></div>
        <!-- Dashboard View -->
        <div id="dashboardDiv" style="display:none;"></div>

    </main>

    <!-- ═══════════════════ SCRIPT ═══════════════════ -->
    <script>
        // Direct URL (kept for reference; fetching via proxy chain below)
        // const CSV_URL = "...";

        let records = [];
        let currentTab = 'khasra';

        // ── Toast ──────────────────────────────────────
        function toast(msg, type = 'success') {
            const bg = { success: 'linear-gradient(to right,#059669,#047857)', error: 'linear-gradient(to right,#dc2626,#b91c1c)', info: 'linear-gradient(to right,#2563eb,#1a1a6e)' };
            Toastify({ text: msg, duration: 3500, gravity: 'top', position: 'right', style: { background: bg[type] || bg.info, borderRadius: '10px', fontWeight: '700', fontSize: '14px' } }).showToast();
        }

        // ── CSV Loader ─────────────────────────────────────────────
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7w0RI9RMbD3vx841C6CHzFyHwwbX2L5zyhjabc2ov7AvR7OWzJfXgvbiPvV6oXvhJZj5RCmcOzq2r/pub?gid=1832973148&single=true&output=csv";

        function processCSVResults(results) {
            if (!results.data || results.data.length === 0) return false;
            records = results.data.map((o, i) => {
                // Use owner name exactly as-is from CSV — no cleaning or trimming
                let ownerClean = o['भूमिस्वामी का नाम'] || 'अज्ञात';

                return {
                    id: i + 1,
                    v: o['ग्राम'] || '',
                    kn: o['खसरा नंबर'] || '',
                    bn: o['बसरा नंबर'] || '',
                    owner: ownerClean || 'अज्ञात',
                    area: parseFloat(o['क्षेत्रफल'] || 0).toFixed(3),
                    type: o['सिंचित / असिंचित'] || '',
                    nistar: o['निस्तार पत्रक विवरण'] || ''
                };
            }).filter(r => r.v && r.kn);
            return records.length > 0;
        }

        function loadData() {
            const badge = document.getElementById('recordCountBadge');
            badge.textContent = '⏳ डेटा लोड हो रहा है...';

            function onSuccess() {
                fillVillages();
                badge.textContent = `✅ ${records.length} रिकॉर्ड लोड`;
                toast(`${records.length} रिकॉर्ड सफलतापूर्वक लोड हुए`, 'success');
            }
            function onError(msg) {
                badge.innerHTML = `❌ लोड विफल &nbsp;<button onclick="loadData()" style="background:#1a1a6e;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;font-weight:700;">🔄 पुनः प्रयास</button>`;
                toast(msg || 'नेटवर्क त्रुटि — कृपया इंटरनेट जांचें', 'error');
            }

            // Primary: fetch() then PapaParse (works reliably from file:// and http://)
            fetch(SHEET_URL)
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                })
                .then(csvText => {
                    const result = Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: 'greedy'
                    });
                    if (processCSVResults(result)) {
                        onSuccess();
                    } else {
                        onError('डेटा पार्स विफल — कॉलम की जांच करें');
                    }
                })
                .catch(fetchErr => {
                    // Fallback: let PapaParse download directly (no worker to avoid file:// issues)
                    console.warn('fetch failed, trying PapaParse direct download:', fetchErr.message);
                    Papa.parse(SHEET_URL, {
                        download: true,
                        header: true,
                        worker: false,   // worker:true breaks on file:// — always false
                        skipEmptyLines: 'greedy',
                        complete: function (results) {
                            if (processCSVResults(results)) {
                                onSuccess();
                            } else {
                                onError('डेटा लोड विफल — "पुनः प्रयास" बटन दबाएं');
                            }
                        },
                        error: function () { onError('नेटवर्क त्रुटि — कृपया इंटरनेट जांचें'); }
                    });
                });
        }

        function fillVillages() {
            const sel = document.getElementById('villageInput');
            const vals = [...new Set(records.map(r => r.v).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'hi'));
            while (sel.options.length > 1) sel.remove(1);
            vals.forEach(v => { const o = document.createElement('option'); o.value = o.text = v; sel.appendChild(o); });
        }

        // ── Village change → fill basra & farmers ───────────────
        document.getElementById('villageInput').addEventListener('change', function () {
            const v = this.value;

            // 1. Populate Basra
            const sel = document.getElementById('basraVal');
            const basras = [...new Set(records.filter(r => r.v === v).map(r => r.bn).filter(Boolean))].sort((a, b) => parseFloat(a) - parseFloat(b) || a.localeCompare(b, 'hi'));
            sel.innerHTML = '<option value="" disabled selected>— बसरा चुनें —</option>';
            basras.forEach(b => { const o = document.createElement('option'); o.value = o.text = b; sel.appendChild(o); });
            sel.disabled = false;
            sel.classList.remove('form-select');
            sel.className = 'form-select';

            // 2. Populate Farmer Names
            const farmerList = document.getElementById('farmerList');
            const namInput = document.getElementById('namVal');
            if (farmerList && namInput) {
                const names = [...new Set(records.filter(r => r.v === v).map(r => r.owner).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'hi'));
                farmerList.innerHTML = '';
                names.forEach(n => { const o = document.createElement('option'); o.value = n; farmerList.appendChild(o); });
                namInput.disabled = false;
                namInput.placeholder = 'नाम टाइप करें या चुनें';
            }

            if (currentTab === 'basra') toast(`${basras.length} बसरा उपलब्ध`, 'info');
            else if (currentTab === 'nam') toast(`${farmerList.options.length} भूमिस्वामी उपलब्ध`, 'info');
        });

        // ── Tab Switch ────────────────────────────────
        function switchTab(tab) {
            currentTab = tab;
            const isDash = tab === 'dashboard';

            // Show/hide search form
            document.getElementById('searchForm').closest('.search-card').style.display = isDash ? 'none' : '';
            document.getElementById('khasraGroup').style.display = tab === 'khasra' ? '' : 'none';
            document.getElementById('basraGroup').style.display = tab === 'basra' ? '' : 'none';
            document.getElementById('namGroup').style.display = tab === 'nam' ? '' : 'none';

            // Tab buttons
            document.getElementById('tab-khasra').className = 'tab-btn' + (tab === 'khasra' ? ' active' : '');
            document.getElementById('tab-basra').className = 'tab-btn' + (tab === 'basra' ? ' active' : '');
            document.getElementById('tab-nam').className = 'tab-btn' + (tab === 'nam' ? ' active' : '');
            document.getElementById('tab-dashboard').className = 'tab-btn' + (tab === 'dashboard' ? ' active' : '');

            // Show/hide results and dashboard panels
            document.getElementById('resultsDiv').innerHTML = '';
            document.getElementById('emptyDiv').style.display = 'none';
            document.getElementById('dashboardDiv').style.display = isDash ? '' : 'none';

            if (isDash) {
                showDashboard();
                return;
            }

            // If village already chosen, populate basra and famerList
            if (tab === 'basra' || tab === 'nam') {
                const v = document.getElementById('villageInput').value;
                if (v) document.getElementById('villageInput').dispatchEvent(new Event('change'));
            }
        }

        // ── Search ────────────────────────────────────
        function handleSearch(e) {
            e.preventDefault();
            const v = document.getElementById('villageInput').value;
            let val = '';

            if (currentTab === 'khasra') val = document.getElementById('khasraVal').value.trim();
            else if (currentTab === 'basra') val = document.getElementById('basraVal').value;
            else if (currentTab === 'nam') val = document.getElementById('namVal').value.trim();

            if (!v) { toast('कृपया ग्राम चुनें', 'error'); return; }
            if (!val) {
                const lbl = currentTab === 'khasra' ? 'खसरा नंबर' : currentTab === 'basra' ? 'बसरा नंबर' : 'भूमिस्वामी का नाम';
                toast(`कृपया ${lbl} चुनें/दर्ज करें`, 'error');
                return;
            }

            setLoading(true);
            setTimeout(() => {
                let found = [];
                if (currentTab === 'khasra') found = records.filter(r => r.v === v && r.kn == val);
                else if (currentTab === 'basra') found = records.filter(r => r.v === v && r.bn == val);
                else if (currentTab === 'nam') found = records.filter(r => r.v === v && r.owner === val);

                setLoading(false);
                renderResults(found, v, val);
            }, 60);
        }

        function setLoading(on) {
            document.getElementById('loadingDiv').style.display = on ? '' : 'none';
            document.getElementById('searchBtn').disabled = on;
            document.getElementById('btnLabel').textContent = on ? 'खोज रहे हैं...' : 'खोजें';
        }

        // ── Render ────────────────────────────────────
        function renderResults(found, v, val) {
            const res = document.getElementById('resultsDiv');
            const emp = document.getElementById('emptyDiv');
            res.innerHTML = '';

            if (!found.length) {
                emp.style.display = '';
                toast('कोई रिकॉर्ड नहीं मिला', 'error');
                return;
            }
            emp.style.display = 'none';
            toast(`${found.length} रिकॉर्ड मिले`, 'success');

            // Portfolio banner for basra or nam
            if (currentTab === 'basra' || currentTab === 'nam') {
                const totalArea = found.reduce((s, r) => s + parseFloat(r.area), 0).toFixed(3);
                const banner = document.createElement('div');
                banner.className = 'portfolio-banner';
                banner.style.marginBottom = '24px';

                const subtitle = currentTab === 'basra'
                    ? `ग्राम: ${v} &nbsp;|&nbsp; बसरा: ${val}`
                    : `ग्राम: ${v} &nbsp;|&nbsp; भूमिस्वामी: ${val}`;

                const ownerName = currentTab === 'basra' ? found[0].owner : val;

                const printFn = currentTab === 'basra'
                    ? `printPortfolio('${escJS(ownerName)}','${escJS(v)}','${escJS(val)}')`
                    : `printFarmerPortfolio('${escJS(ownerName)}','${escJS(v)}')`;

                banner.innerHTML = `
        <div style="display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between;">
          <div>
            <div style="font-size:11px; font-weight:700; opacity:0.6; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px;">भूमिस्वामी पोर्टफोलियो</div>
            <div style="font-size:22px; font-weight:900; line-height:1.1;">${ownerName}</div>
            <div style="margin-top:6px; opacity:0.75; font-size:14px;">${subtitle}</div>
          </div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <div class="pf-stat">
              <div class="pf-stat-label">कुल खसरा</div>
              <div class="pf-stat-val">${found.length}</div>
            </div>
            <div class="pf-stat">
              <div class="pf-stat-label">कुल क्षेत्रफल</div>
              <div class="pf-stat-val">${totalArea} <span style="font-size:14px;font-weight:600;opacity:0.7;">हे.</span></div>
            </div>
          </div>
          <button onclick="${printFn}" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;align-self:center;">🖨 Portfolio Print</button>
          
        </div>`;
                res.appendChild(banner);
            }

            // Cards grid
            const grid = document.createElement('div');
            grid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px;';
            found.forEach((r, idx) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.style.animationDelay = `${idx * 0.06}s`;
                const hdrClass = currentTab === 'nam' ? 'card-header-khasra' : `card-header-${currentTab}`;
                const typeBadge = r.type.includes('असिंचित') ? 'asinchai' : 'sinchai';
                card.innerHTML = `
        <div class="${hdrClass}" style="padding:16px 20px; display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <div style="font-size:10px; font-weight:700; color:rgba(255,255,255,0.65); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px;">
              ${currentTab === 'khasra' ? 'खसरा नंबर' : currentTab === 'basra' ? 'बसरा नंबर' : 'खसरा नंबर'}
            </div>
            <div class="card-kn" style="color:#fff;">${currentTab === 'basra' ? r.bn : r.kn}</div>
            <div style="font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px; font-weight:600;">${r.v}</div>
          </div>
          <button onclick="event.stopPropagation();printSingleRecord(${JSON.stringify(r).replace(/"/g, '&quot;')})" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.35);color:#fff;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">🖨 Print</button>
        </div>
        <div style="padding:18px 20px; display:flex; flex-direction:column; gap:14px;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div class="stat-chip">
              <div class="stat-chip-label">खसरा नं.</div>
              <div class="stat-chip-val">${r.kn}</div>
            </div>
            <div class="stat-chip">
              <div class="stat-chip-label">बसरा नं.</div>
              <div class="stat-chip-val">${r.bn}</div>
            </div>
          </div>
          <div style="border-top:1px solid var(--border); padding-top:12px;">
            <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px;">भूमिस्वामी</div>
            <div style="font-size:14px; font-weight:700; color:var(--text-main); line-height:1.4;">${r.owner}</div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; border-top:1px solid var(--border); padding-top:12px;">
            <div>
              <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px;">क्षेत्रफल (हे.)</div>
              <div style="font-size:18px; font-weight:900; color:var(--text-main);">${r.area}</div>
            </div>
            <div>
              <div style="font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px;">प्रकार</div>
              <span class="type-badge ${typeBadge}">${r.type || '—'}</span>
            </div>
          </div>
          ${r.nistar ? `
          <div style="background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:10px 14px; border-top:1px solid var(--border); padding-top:12px;">
            <div style="font-size:10px; font-weight:700; color:#92400e; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px;">निस्तार विवरण</div>
            <div style="font-size:14px; font-weight:700; color:#78350f; line-height:1.5; font-family:'Noto Sans Devanagari',Arial,sans-serif;">${r.nistar}</div>
          </div>` : ''}
        </div>`;
                grid.appendChild(card);
            });
            res.appendChild(grid);
        }

        function escJS(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '').replace(/\n/g, ' '); }

        // ══════════════════════════════════════════════
        // �️ PRINT / PDF  (Lovable-style: window.open + window.print)
        // ══════════════════════════════════════════════

        function printSingleRecord(r) {
            const pw = window.open('', '_blank');
            if (!pw) { toast('Popup blocked! Allow popups and try again.', 'error'); return; }
            const sinchType = r.type && !r.type.includes('असिंचित') ? 'badge-green' : 'badge-orange';
            pw.document.write(`<!DOCTYPE html>
<html lang="hi"><head>
<meta charset="UTF-8">
<title>भूमि रिकॉर्ड – ${r.v} – खसरा ${r.kn}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  .badges { display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap; }

  <tr><th>📄 बसरा नंबर</th><td>${r.bn}</td></tr>
  <tr><th>👤 भूमिस्वामी</th><td>${r.owner}</td></tr>
  <tr><th>📐 क्षेत्रफल (हेक्टेयर)</th><td>${r.area} हे.</td></tr>

</body></html>`);
            pw.document.close();
        }

        function printPortfolio(owner, village, basraNo) {
            const basraRecs = records.filter(r => r.v === village && r.bn === basraNo);
            if (!basraRecs.length) return;
            const totalArea = basraRecs.reduce((s, r) => s + parseFloat(r.area || 0), 0).toFixed(3);
            const sinchai = basraRecs.filter(r => r.type && r.type.includes('सिंचित') && !r.type.includes('असिंचित')).length;
            const asinchai = basraRecs.length - sinchai;

            const rowsHtml = basraRecs.map((r, i) => `
              <tr style="background:${i % 2 === 0 ? '#f8fafc' : '#fff'}">
                <td style="text-align:center;font-weight:800;">${i + 1}</td>
                <td style="font-weight:800;text-align:center;">${r.kn}</td>
                <td>${r.owner}</td>
                <td style="text-align:center;">${r.area}</td>
                <td>${r.type || '—'}</td>
                <td>${r.nistar || '—'}</td>
              </tr>`).join('');

            const pw = window.open('', '_blank');
            if (!pw) { toast('Popup blocked! Allow popups and try again.', 'error'); return; }
            pw.document.write(`<!DOCTYPE html>
<html lang="hi"><head>
<meta charset="UTF-8">
<title>बसरा पोर्टफोलियो – ${village} – बसरा ${basraNo}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family:'Noto Sans Devanagari','Inter',sans-serif; padding:30px; color:#1a1a1a; background:#fff; }
  h1 { text-align:center; font-size:22px; font-weight:800; margin-bottom:4px; color:#1a1a6e; }
  .subtitle { text-align:center; font-size:14px; color:#555; margin-bottom:20px; }
  .summary { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:24px; justify-content:center; }
  .summary-item { background:#f0f4ff; border:1px solid #d1d9ff; border-radius:10px; padding:12px 20px; text-align:center; min-width:100px; }
  .summary-item .val { font-size:22px; font-weight:900; color:#1a1a6e; }
  .summary-item .lbl { font-size:11px; color:#64748b; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; }
  .green .val { color:#065f46; } .green { background:#d1fae5; border-color:#6ee7b7; }
  .orange .val { color:#9a3412; } .orange { background:#ffedd5; border-color:#fdba74; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { border:1px solid #e2e8f0; padding:10px 14px; text-align:left; vertical-align:middle; }
  th { background:#1a1a6e; color:#fff; font-weight:700; font-size:13px; }
  .footer { margin-top:24px; text-align:center; font-size:11px; color:#aaa; border-top:1px solid #e2e8f0; padding-top:12px; }
  @media print { body { padding:15px; } }

                    const eased = 1 - Math.pow(1 - progress, 3);
                    const current = Math.round(eased * target);
                    el.textContent = isDecimal && progress >= 1 ? parseFloat(isDecimal).toFixed(2) : current;
                    if (progress < 1) requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);
            });
        }

        // ── Filter village cards in dashboard ──
        function filterDashCards(query) {
            const q = query.trim().toLowerCase();
            document.querySelectorAll('.dash-gram-card').forEach(card => {
                const gram = (card.dataset.gram || '').toLowerCase();
                card.style.display = gram.includes(q) ? '' : 'none';
            });
        }


        // ── Init ──────────────────────────────────────
        loadData();

    </script>
</body>
