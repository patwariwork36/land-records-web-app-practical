<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌾 भूमि रिकॉर्ड खोज | Land Record Search Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        secondary: "#10b981",
                        background: "#f9fafb",
                        dark: "#111827",
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }

        .card-anim {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-anim:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide {
            animation: slideIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="bg-[#f0f2f5] min-h-screen text-[#111827]">
    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        <!-- Header -->
        <header class="text-center mb-12 animate-slide">
            <div class="inline-flex p-3 bg-white rounded-2xl shadow-sm mb-6">
                <i data-lucide="sprout" class="w-10 h-10 text-green-500"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-[#111827] mb-3">भूमि रिकॉर्ड खोज</h1>
            <p class="text-gray-500 text-lg">तहसील तिल्दा - डिजिटल भू-अभिलेख पोर्टल</p>
        </header>

        <!-- Search Container -->
        <div class="bg-white rounded-[2rem] shadow-xl shadow-blue-900/5 p-2 mb-8 animate-slide"
            style="animation-delay: 0.1s">
            <!-- Tabs -->
            <div class="flex p-1 gap-1">
                <button id="tab-khasra" onclick="switchTab('khasra')"
                    class="flex-1 py-4 px-6 rounded-2xl font-bold flex items-center justify-center transition-all bg-primary text-white shadow-lg shadow-blue-500/30">
                    <i data-lucide="search" class="w-5 h-5 mr-2"></i>
                    खसरा खोज
                </button>
                <button id="tab-basra" onclick="switchTab('basra')"
                    class="flex-1 py-4 px-6 rounded-2xl font-bold flex items-center justify-center transition-all text-gray-400 hover:bg-gray-50">
                    <i data-lucide="book-open" class="w-5 h-5 mr-2"></i>
                    बसरा खोज
                </button>
            </div>

            <!-- Form -->
            <div class="p-6 md:p-8">
                <form id="searchForm" class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-5">
                        <label
                            class="block text-sm font-semibold text-gray-500 mb-2 ml-1 uppercase tracking-wider">ग्राम
                            चयन</label>
                        <div class="relative">
                            <i data-lucide="map-pin"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <select id="villageInput" required
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none text-lg font-medium appearance-none">
                                <option value="">ग्राम चुनें...</option>
                                <option value="छेरकापुर">छेरकापुर</option>
                                <option value="छड़िया">छड़िया</option>
                                <option value="तिल्दा">तिल्दा</option>
                                <option value="गबौद">गबौद</option>
                            </select>
                        </div>
                    </div>
                    <div class="md:col-span-4">
                        <label id="searchLabel"
                            class="block text-sm font-semibold text-gray-500 mb-2 ml-1 uppercase tracking-wider">खसरा
                            नंबर</label>
                        <div class="relative">
                            <i data-lucide="hash"
                                class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                            <input type="text" id="searchValue" required placeholder="उदा: 123/1"
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-primary outline-none text-lg font-medium">
                        </div>
                    </div>
                    <div class="md:col-span-3 flex items-end">
                        <button type="submit"
                            class="w-full py-4 bg-[#111827] text-white rounded-2xl font-bold text-lg hover:bg-gray-800 transition-all flex items-center justify-center shadow-lg active:scale-95">
                            खोज शुरू करें
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Feedback Area -->
        <div id="loading" class="hidden py-12 text-center animate-slide">
            <div
                class="inline-block w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin mb-4">
            </div>
            <p class="text-gray-500 font-medium">डेटाबेस से कनेक्ट किया जा रहा है...</p>
        </div>

        <div id="results" class="space-y-6">
            <!-- Results will be injected here -->
        </div>

        <div id="emptyState"
            class="hidden py-20 text-center bg-white rounded-[2rem] border-2 border-dashed border-gray-200 animate-slide">
            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="database-zap" class="w-10 h-10 text-gray-300"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-400">कोई रिकॉर्ड नहीं मिला</h3>
            <p class="text-gray-400">कृपया दर्ज की गई जानकारी की जांच करें</p>
        </div>
    </div>

    <!-- Script Section -->
    <script>
        let currentTab = 'khasra';
        let records = [];
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7w0RI9RMbD3vx841C6CHzFyHwwbX2L5zyhjabc2ov7AvR7OWzJfXgvbiPvV6oXvhJZj5RCmcOzq2r/pub?gid=1832973148&single=true&output=csv";

        // Robust CSV Parser and Fetcher
        async function loadDataFromCSV() {
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error("Failed to fetch Google Sheet data");
                const csvText = await response.text();

                records = parseCSV(csvText);
                console.log("Loaded " + records.length + " records from Google Sheets");

                loading.classList.add('hidden');
                // Pre-populate village dropdown from data if needed
                updateVillageDropdown(records);
            } catch (error) {
                console.error("CSV Load Error:", error);
                loading.classList.add('hidden');
                alert("डेटा लोड करने में विफल: " + error.message);
            }
        }

        function parseCSV(text) {
            const lines = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        currentField += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        currentRow.push(currentField.trim());
                        currentField = '';
                    } else if (char === '\n' || char === '\r') {
                        currentRow.push(currentField.trim());
                        if (currentRow.length > 1) lines.push(currentRow);
                        currentRow = [];
                        currentField = '';
                        if (char === '\r' && nextChar === '\n') i++;
                    } else {
                        currentField += char;
                    }
                }
            }
            if (currentRow.length > 0 || currentField !== '') {
                currentRow.push(currentField.trim());
                lines.push(currentRow);
            }

            const headers = lines[0];
            return lines.slice(1).map((row, idx) => {
                const item = {};
                headers.forEach((h, i) => item[h] = row[i]);

                return {
                    id: idx + 1,
                    v: item["ग्राम"] || "अज्ञात",
                    kn: item["खसरा नंबर"] || "0",
                    bn: item["बसरा नंबर"] || "0",
                    owner: item["भूमिस्वामी का नाम"] ? item["भूमिस्वामी का नाम"].replace(/\n/g, '<br>') : "अज्ञात",
                    area: parseFloat(item["क्षेत्रफल"] || 0).toFixed(3),
                    type: item["सिंचित / असिंचित"] || "अज्ञात",
                    nistar: item["निस्तार पत्रक विवरण"] || ""
                };
            });
        }

        function updateVillageDropdown(data) {
            const select = document.getElementById('villageInput');
            const villages = [...new Set(data.map(r => r.v).filter(Boolean))];

            // Clear existing options except the first one
            while (select.options.length > 1) select.remove(1);

            villages.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.innerText = v;
                select.appendChild(opt);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            const btnK = document.getElementById('tab-khasra');
            const btnB = document.getElementById('tab-basra');
            const label = document.getElementById('searchLabel');
            const input = document.getElementById('searchValue');

            if (tab === 'khasra') {
                btnK.className = 'flex-1 py-4 px-6 rounded-2xl font-bold flex items-center justify-center transition-all bg-primary text-white shadow-lg shadow-blue-500/30';
                btnB.className = 'flex-1 py-4 px-6 rounded-2xl font-bold flex items-center justify-center transition-all text-gray-400 hover:bg-gray-50';
                label.innerText = 'खसरा नंबर';
                input.placeholder = 'उदा: 123/1';
            } else {
                btnB.className = 'flex-1 py-4 px-6 rounded-2xl font-bold flex items-center justify-center transition-all bg-secondary text-white shadow-lg shadow-green-500/30';
                btnK.className = 'flex-1 py-4 px-6 rounded-2xl font-bold flex items-center justify-center transition-all text-gray-400 hover:bg-gray-50';
                label.innerText = 'बसरा नंबर';
                input.placeholder = 'उदा: 456';
            }
            document.getElementById('results').innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden');
            lucide.createIcons();
        }

        document.getElementById('searchForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const v = document.getElementById('villageInput').value;
            const val = document.getElementById('searchValue').value.trim();

            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            const empty = document.getElementById('emptyState');

            resultsDiv.innerHTML = '';
            empty.classList.add('hidden');
            loading.classList.remove('hidden');

            setTimeout(() => {
                loading.classList.add('hidden');
                let found = [];
                if (currentTab === 'khasra') {
                    // Match against kn (Khasra Number)
                    found = records.filter(x => x.v === v && x.kn == val);
                } else {
                    // Match against bn (Basra Number)
                    found = records.filter(x => x.v === v && x.bn == val);
                }

                if (found.length === 0) {
                    empty.classList.remove('hidden');
                } else {
                    if (currentTab === 'basra') {
                        const totalArea = found.reduce((acc, curr) => acc + parseFloat(curr.area), 0).toFixed(3);
                        resultsDiv.innerHTML += `
                            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-green-100 flex flex-col md:flex-row justify-between items-center gap-6 animate-slide">
                                <div class="w-full text-center md:text-left">
                                    <h2 class="text-xl font-bold text-gray-800 mb-1">पोर्टफोलियो सारांश</h2>
                                    <p class="text-green-600 font-semibold flex items-center justify-center md:justify-start">
                                        <i data-lucide="user-check" class="w-4 h-4 mr-2"></i>पंजीकृत रिकॉर्ड्स
                                    </p>
                                </div>
                                <div class="flex gap-4">
                                     <div class="bg-green-50 px-6 py-4 rounded-2xl text-center">
                                         <p class="text-xs text-green-700 font-bold uppercase mb-1">कुल खसरा</p>
                                         <p class="text-2xl font-bold text-green-900">${found.length}</p>
                                     </div>
                                     <div class="bg-green-50 px-6 py-4 rounded-2xl text-center">
                                         <p class="text-xs text-green-700 font-bold uppercase mb-1">कुल क्षेत्रफल</p>
                                         <p class="text-2xl font-bold text-green-900">${totalArea} <span class="text-sm">हे.</span></p>
                                     </div>
                                </div>
                            </div>
                        `;
                    }

                    resultsDiv.innerHTML += `
                        <div class="grid gap-6 ${currentTab === 'khasra' ? 'grid-cols-1' : 'grid-cols-1 md:grid-cols-2'}">
                            ${found.map(r => `
                                <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 card-anim animate-slide">
                                    <div class="p-6 ${currentTab === 'khasra' ? 'bg-primary' : 'bg-secondary'} text-white flex justify-between items-center">
                                        <div class="flex items-center">
                                            <i data-lucide="map" class="w-5 h-5 mr-3 opacity-80"></i>
                                            <span class="font-bold text-lg">${r.v}</span>
                                        </div>
                                        <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-mono tracking-tighter">REF: ${r.id}</span>
                                    </div>
                                    <div class="p-8 space-y-6">
                                        <div class="grid grid-cols-2 gap-4">
                                            <div class="bg-gray-50 p-4 rounded-2xl text-center">
                                                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">खसरा नंबर</p>
                                                <p class="text-2xl font-bold text-gray-800">${r.kn}</p>
                                            </div>
                                            <div class="bg-gray-50 p-4 rounded-2xl text-center">
                                                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">बसरा नंबर</p>
                                                <p class="text-2xl font-bold text-gray-800">${r.bn}</p>
                                            </div>
                                        </div>
                                        <div class="space-y-4 pt-4 border-t border-gray-50 font-medium">
                                            <div class="flex flex-col gap-1">
                                                <span class="text-gray-400 text-xs font-bold uppercase">क्षेत्रफल (हे.)</span>
                                                <span class="font-bold text-gray-800 text-lg">${r.area}</span>
                                            </div>
                                            <div class="flex flex-col gap-1">
                                                <span class="text-gray-400 text-xs font-bold uppercase">भूमि प्रकार</span>
                                                <div>
                                                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold">${r.type}</span>
                                                </div>
                                            </div>
                                            <div class="flex flex-col gap-1">
                                                <span class="text-gray-400 text-xs font-bold uppercase">भूमिस्वामी</span>
                                                <div class="bg-gray-50/50 p-3 rounded-xl border border-gray-100 text-sm leading-relaxed text-gray-900 font-semibold">
                                                    ${r.owner}
                                                </div>
                                            </div>
                                            ${r.nistar ? `
                                            <div class="flex flex-col gap-1 pt-2">
                                                <span class="text-gray-400 text-xs font-bold uppercase">निस्तार विवरण</span>
                                                <p class="text-xs text-gray-500 italic leading-snug">${r.nistar}</p>
                                            </div>` : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                lucide.createIcons();
            }, 500);
        });

        // Initialize loader
        loadDataFromCSV();
        lucide.createIcons();
    </script>

</body>

</html>
